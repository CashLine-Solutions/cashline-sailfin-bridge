# PostgreSQL multi-database configuration.
#
# Three databases:
#   - primary:    application data (objects, fields, runs, profiles, GoodJob)
#   - audit:      append-only audit events; runs under a separate role with
#                 INSERT-only privileges + a BEFORE UPDATE OR DELETE trigger
#   - cache:      Solid Cache backend (token cache, Rails.cache)
#
# The audit DB uses two roles:
#   - cashline_audit_owner — owns the table and trigger; runs migrations only
#   - cashline_audit_writer — Rails runtime role, INSERT/SELECT only
# See lib/tasks/audit.rake for role provisioning.

default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary:
    <<: *default
    database: cashline_ontology_development
  cache:
    <<: *default
    database: cashline_ontology_development_cache
    migrations_paths: db/cache_migrate
  audit:
    <<: *default
    database: cashline_ontology_development_audit
    migrations_paths: db/audit_migrate
    # In development we use the same Postgres role as primary for convenience.
    # The audit role separation is enforced in production (and in CI smoke tests).

test:
  primary:
    <<: *default
    database: cashline_ontology_test
    # In CI, DATABASE_URL points at the Postgres service container. Without
    # this explicit `url:` line, only the primary DB picks it up via Rails'
    # implicit DATABASE_URL handling — the cache + audit DBs default to a
    # Unix socket that doesn't exist in the CI runner.
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *default
    database: cashline_ontology_test_cache
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cache_migrate
  audit:
    <<: *default
    database: cashline_ontology_test_audit
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/audit_migrate

production:
  # Render (and any managed Postgres) injects connection strings as env vars.
  # render.yaml maps each provisioned DB to PRIMARY/CACHE/AUDIT_DATABASE_URL.
  # The audit DB uses the same role as primary in deployed envs — the
  # writer-only role separation (lib/tasks/audit.rake) requires superuser
  # access that Render doesn't grant. Hardening tracked separately.
  primary:
    <<: *default
    url: <%= ENV["PRIMARY_DATABASE_URL"] %>
  cache:
    <<: *default
    url: <%= ENV["CACHE_DATABASE_URL"] %>
    migrations_paths: db/cache_migrate
  audit:
    <<: *default
    url: <%= ENV["AUDIT_DATABASE_URL"] %>
    migrations_paths: db/audit_migrate
